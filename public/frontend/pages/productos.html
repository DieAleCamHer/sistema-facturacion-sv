<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos - Sistema de Facturación SV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand" href="dashboard.html">
                <i class="bi bi-receipt-cutoff"></i> Facturación SV
            </a>
            <div class="d-flex align-items-center">
                <div id="userInfo"></div>
                <button class="btn btn-outline-light" onclick="logout()">
                    <i class="bi bi-box-arrow-right"></i> Salir
                </button>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-2">
                <div class="list-group">
                    <a href="dashboard.html" class="list-group-item list-group-item-action">
                        <i class="bi bi-house-door"></i> Dashboard
                    </a>
                    <a href="clientes.html" class="list-group-item list-group-item-action">
                        <i class="bi bi-people"></i> Clientes
                    </a>
                    <a href="productos.html" class="list-group-item list-group-item-action active">
                        <i class="bi bi-box-seam"></i> Productos
                    </a>
                    <a href="factura-v2.html" class="list-group-item list-group-item-action">
                        <i class="bi bi-file-earmark-text"></i> Nueva Factura
                    </a>
                    <a href="ccf-v2.html" class="list-group-item list-group-item-action">
                        <i class="bi bi-file-earmark-ruled"></i> Nuevo CCF
                    </a>
                    <a href="nota-credito-v2.html" class="list-group-item list-group-item-action">
                        <i class="bi bi-file-earmark-minus"></i> Nota de Crédito
                    </a>
                    <a href="lista-dtes.html" class="list-group-item list-group-item-action">
                        <i class="bi bi-list-ul"></i> Ver DTEs
                    </a>
                    <a href="invalidar-dte.html" class="list-group-item list-group-item-action">
                        <i class="bi bi-x-circle"></i> Invalidar DTE
                    </a>
                </div>
            </div>

            <!-- Contenido principal -->
            <div class="col-md-10">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2><i class="bi bi-box-seam text-primary"></i> Gestión de Productos</h2>
                    <button class="btn btn-primary" onclick="abrirModalNuevo()">
                        <i class="bi bi-plus-circle"></i> Nuevo Producto
                    </button>
                </div>

                <!-- Tabla -->
                <div class="card shadow-sm">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead class="table-light">
                                    <tr>
                                        <th>Código</th>
                                        <th>Descripción</th>
                                        <th class="text-end">Precio</th>
                                        <th class="text-center">Stock</th>
                                        <th>Tipo</th>
                                        <th>Unidad</th>
                                        <th>Tributo</th>
                                        <th>Acciones</th>
                                    </tr>
                                </thead>
                                <tbody id="tablaProductos">
                                    <tr>
                                        <td colspan="8" class="text-center">
                                            <div class="spinner-border text-primary"></div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Producto -->
    <div class="modal fade" id="modalProducto" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalProductoLabel">Nuevo Producto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formProducto">
                        <input type="hidden" id="productoId">
                        <div class="mb-3">
                            <label for="codigo" class="form-label">Código *</label>
                            <input type="text" class="form-control" id="codigo" required>
                        </div>

                        <div class="mb-3">
                            <label for="descripcion" class="form-label">Descripción *</label>
                            <input type="text" class="form-control" id="descripcion" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="precio" class="form-label">Precio Unitario *</label>
                                <div class="input-group">
                                    <span class="input-group-text">$</span>
                                    <input type="number" class="form-control" id="precio" step="0.01" min="0" required>
                                </div>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="stock" class="form-label">Stock</label>
                                <input type="number" class="form-control" id="stock" min="0" value="0">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="tipo_item" class="form-label">Tipo de Ítem *</label>
                            <select class="form-select" id="tipo_item" required>
                                <option value="1">Bien</option>
                                <option value="2">Servicio</option>
                                <option value="3">Bien y Servicio</option>
                                <option value="4">Otros Tributos</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="unidad_medida" class="form-label">Unidad de Medida *</label>
                            <select class="form-select" id="unidad_medida" required>
                                <option value="59">Unidad</option>
                                <option value="99">Caja</option>
                                <option value="58">Docena</option>
                                <option value="57">Kilogramo</option>
                                <option value="49">Litro</option>
                                <option value="53">Metro</option>
                                <option value="62">Libra</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="tributo" class="form-label">Tributo *</label>
                            <select class="form-select" id="tributo" required>
                                <option value="20">IVA (13%)</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="guardar()">
                        <i class="bi bi-save"></i> Guardar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/productos.js"></script>
</body>
</html>
