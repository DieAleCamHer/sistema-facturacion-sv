<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de DTEs - Sistema de Facturación SV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand" href="dashboard.html">
                <i class="bi bi-receipt-cutoff"></i> Facturación SV
            </a>
            <div class="d-flex align-items-center">
                <div id="userInfo"></div>
                <button class="btn btn-outline-light" onclick="logout()">
                    <i class="bi bi-box-arrow-right"></i> Salir
                </button>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-2">
                <div class="list-group">
                    <a href="dashboard.html" class="list-group-item list-group-item-action">
                        <i class="bi bi-house-door"></i> Dashboard
                    </a>
                    <a href="clientes.html" class="list-group-item list-group-item-action">
                        <i class="bi bi-people"></i> Clientes
                    </a>
                    <a href="productos.html" class="list-group-item list-group-item-action">
                        <i class="bi bi-box-seam"></i> Productos
                    </a>
                    <a href="factura-v2.html" class="list-group-item list-group-item-action">
                        <i class="bi bi-file-earmark-text"></i> Nueva Factura
                    </a>
                    <a href="ccf-v2.html" class="list-group-item list-group-item-action">
                        <i class="bi bi-file-earmark-ruled"></i> Nuevo CCF
                    </a>
                    <a href="nota-credito-v2.html" class="list-group-item list-group-item-action">
                        <i class="bi bi-file-earmark-minus"></i> Nota de Crédito
                    </a>
                    <a href="lista-dtes.html" class="list-group-item list-group-item-action active">
                        <i class="bi bi-list-ul"></i> Ver DTEs
                    </a>
                    <a href="invalidar-dte.html" class="list-group-item list-group-item-action">
                        <i class="bi bi-x-circle"></i> Invalidar DTE
                    </a>
                </div>
            </div>

            <!-- Contenido principal -->
            <div class="col-md-10">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2><i class="bi bi-list-ul text-primary"></i> Lista de DTEs Emitidos</h2>
                    <div class="btn-group">
                        <a href="factura-v2.html" class="btn btn-primary">
                            <i class="bi bi-plus-circle"></i> Nueva Factura
                        </a>
                        <a href="ccf-v2.html" class="btn btn-success">
                            <i class="bi bi-plus-circle"></i> Nuevo CCF
                        </a>
                        <a href="nota-credito-v2.html" class="btn btn-warning">
                            <i class="bi bi-plus-circle"></i> Nota de Crédito
                        </a>
                    </div>
                </div>

                <!-- Filtros -->
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-3">
                                <label for="filtroTipo" class="form-label">Tipo de DTE</label>
                                <select class="form-select" id="filtroTipo">
                                    <option value="">Todos</option>
                                    <option value="01">Factura</option>
                                    <option value="03">CCF</option>
                                    <option value="05">Nota de Crédito</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label for="filtroEstado" class="form-label">Estado</label>
                                <select class="form-select" id="filtroEstado">
                                    <option value="">Todos</option>
                                    <option value="procesado">Procesado</option>
                                    <option value="invalidado">Invalidado</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label for="filtroFechaDesde" class="form-label">Fecha Desde</label>
                                <input type="date" class="form-control" id="filtroFechaDesde">
                            </div>
                            <div class="col-md-3">
                                <label for="filtroFechaHasta" class="form-label">Fecha Hasta</label>
                                <input type="date" class="form-control" id="filtroFechaHasta">
                            </div>
                        </div>
                        <div class="mt-3 text-end">
                            <button class="btn btn-secondary" onclick="limpiarFiltros()">
                                <i class="bi bi-x-circle"></i> Limpiar
                            </button>
                            <button class="btn btn-primary" onclick="aplicarFiltros()">
                                <i class="bi bi-search"></i> Buscar
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Tabla de DTEs -->
                <div class="card shadow-sm">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead class="table-light">
                                    <tr>
                                        <th>Fecha</th>
                                        <th>Tipo</th>
                                        <th>Número Control</th>
                                        <th>Caja</th>
                                        <th>Facturador</th>
                                        <th>Cliente</th>
                                        <th class="text-end">Total</th>
                                        <th>Estado</th>
                                        <th>Acciones</th>
                                    </tr>
                                </thead>
                                <tbody id="tablaDTEs">
                                    <tr>
                                        <td colspan="9" class="text-center">
                                            <div class="spinner-border text-primary"></div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Detalles -->
    <div class="modal fade" id="modalDetalles" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Detalles del DTE</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="contenidoDetalles">
                    <!-- Se llenará dinámicamente -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/lista-dtes.js"></script>
</body>
</html>
